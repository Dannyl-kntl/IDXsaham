name: Super Scanner - Teknikal + Money Flow

on:
  schedule:
    - cron: '0 22 * * 0-4'   # 06:00 WITA (Pagi, cek gap up)
    - cron: '30 8 * * 1-5'   # 16:30 WITA (Sore, screening utama)
  workflow_dispatch:          # Tombol manual untuk testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Library
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests pytz

      - name: Jalankan Super Scanner
      run: python golden.py || true
